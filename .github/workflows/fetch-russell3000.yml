name: Fetch Russell 3000 (Weekly)

on:
  schedule:
    # 08:00 UTC Saturday = 4am ET Saturday
    - cron: '0 8 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas lxml

      - name: Fetch Russell 3000 data
        run: python scripts/fetch_antares.py --tier russell3000 --output-dir data --max-workers 10

      - name: Commit updated JSON
        run: |
          git config user.name "antares-bot"
          git config user.email "actions@github.com"
          git add data/antares-russell3000.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: refresh Russell 3000 [$(date -u +%Y-%m-%d)]"
            git push
          fi
